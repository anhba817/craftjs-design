# Phase 15 § 9.5 — pre-commit hooks (opt-in).
#
# Contributors enable these with `npx lefthook install` (CONTRIBUTING.md
# documents it; the `prepare` script also runs it on `npm install`, guarded
# so a missing binary never breaks install). On commit, lint + typecheck
# the staged files so obvious breakage is caught before CI.

pre-commit:
  parallel: true
  jobs:
    - name: lint
      glob: '*.{ts,tsx}'
      # The standalone example sub-projects have their own tsconfig (extra
      # TSConfig roots the parser can't disambiguate) and are excluded from the
      # repo's eslint/tsc — drift-checked by `check:example` instead. Exclude
      # them here too, else passing one as an explicit staged file (multi-file
      # projectService run) trips the multi-TSConfigRoot parser error.
      exclude:
        - 'examples/**/*'
      run: npx eslint {staged_files}
    - name: typecheck
      # tsc -b is project-wide (no per-file mode with project references),
      # so run the whole typecheck when any TS file is staged.
      glob: '*.{ts,tsx}'
      run: npx tsc -b

pre-push:
  jobs:
    - name: test
      run: npx vitest run
