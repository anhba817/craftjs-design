name: CI

# Phase 15 § 9.4 — lint + typecheck + test + dist build + bundle budget on
# every push and PR. The bundle-budget step (check:size) reads the
# build:dist output, so it runs after the build.

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc -b

      - name: Test
        run: npx vitest run

      - name: Chrome token guard
        run: npm run check:chrome

      - name: CLI scaffold compile gate
        run: npm run check:cli

      - name: Adapter matrix (built-in coverage)
        run: npm run docs:matrix -- --check

      - name: Build (dist)
        run: npm run build:dist

      - name: Bundle budget
        run: npm run check:size

      - name: Example drift guard (minimal-host vs built package)
        run: npm run check:example

      - name: License audit
        run: npm run check:licenses

      - name: Dependency audit (advisory)
        # Vuln scan on production deps. Advisory (|| true) so a transitive
        # advisory doesn't block merges; review the output in the run.
        run: npm audit --omit=dev || true

  # Phase 22 — the MCP screenshot / exact-contrast path needs a real browser,
  # which the main `verify` job deliberately lacks (so it stays fast and the
  # renderImage suite skips there). This dedicated job installs Chromium + the
  # render harness and runs ONLY that suite, so the browser path stays covered
  # in CI rather than only locally.
  browser-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Install Chromium (+ system deps)
        run: npx playwright install --with-deps chromium

      - name: Build render harness
        # renderImage loads dist-lib/harness/; build:harness emits just that
        # (not the full dist), so this job stays lean.
        run: npm run build:harness

      - name: Browser render + contrast tests
        run: npx vitest run src/mcp/renderImage.test.ts
