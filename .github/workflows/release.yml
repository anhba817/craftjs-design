name: Release

# Phase 15 § 9.6 — Changesets-driven release. On merge to main:
#   - if pending changesets exist, opens/updates a "Version Packages" PR
#     (bumps package.json + folds changesets into CHANGELOG);
#   - when that PR merges (no pending changesets), publishes to npm via
#     `npm run release` (build:dist && changeset publish).
#
# Host actions required before this works:
#   - add the NPM_TOKEN repository secret (npm automation token);
#   - GITHUB_TOKEN is provided automatically by Actions.

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: npm ci

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: npm run version-packages
          publish: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
