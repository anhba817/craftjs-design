name: API docs

# Phase 15 § 10.1 — build the SDK API reference (TypeDoc HTML) and deploy
# it to GitHub Pages on every push to main.
#
# Host action required once: repo Settings → Pages → Source = "GitHub
# Actions". Until then this workflow builds but the deploy step has nowhere
# to publish.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build API reference (HTML)
        run: npm run docs:html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
