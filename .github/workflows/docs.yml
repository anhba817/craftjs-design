name: Docs site

# Phase 15 § 10.1 / Phase 18 — build the documentation site and deploy it to
# GitHub Pages on every push to main. The site has two parts:
#
#   /        → the hand-crafted guide site (scripts/build-docs-site.ts, from
#              the markdown in docs/ + the quick-start) → docs-site/index.html
#   /api/    → the auto-generated TypeDoc API reference (npm run docs:html)
#
# Host action required once: repo Settings → Pages → Source = "GitHub Actions".
# Until then this builds but the deploy step has nowhere to publish.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Build docs site (landing + guides)
        run: npm run docs:site # → docs-site/index.html

      - name: Build API reference (TypeDoc HTML)
        run: npm run docs:html # → _site/

      - name: Assemble Pages site (guides at /, API at /api)
        run: |
          rm -rf _pages
          mkdir -p _pages/api
          cp -R _site/. _pages/api/
          cp -R docs-site/. _pages/   # index.html + robots.txt + sitemap.xml
          touch _pages/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
